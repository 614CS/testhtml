<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Direcciones</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: #f5f5f5;
      --foreground: #262626;
      --card: #ffffff;
      --card-foreground: #262626;
      --primary: #525252;
      --primary-foreground: #fafafa;
      --secondary: #e5e5e5;
      --secondary-foreground: #404040;
      --muted: #e5e5e5;
      --muted-foreground: #737373;
      --accent: #14b8a6;
      --accent-foreground: #fafafa;
      --destructive: #dc2626;
      --border: #d4d4d4;
      --input: #e5e5e5;
      --radius: 4px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .space-y-8 > * + * {
      margin-top: 2rem;
    }

    .space-y-4 > * + * {
      margin-top: 1rem;
    }

    .space-y-2 > * + * {
      margin-top: 0.5rem;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(82, 82, 82, 0.1);
      color: var(--primary);
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--muted-foreground);
      max-width: 28rem;
      margin: 0 auto;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .card-header {
      padding: 1.5rem 1.5rem 0;
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-description {
      color: var(--muted-foreground);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .card-content {
      padding: 1.5rem;
    }

    .card-content.p-4 {
      padding: 1rem;
    }

    /* Accent bar */
    .accent-bar {
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--accent));
    }

    .accent-bar.valid {
      background: var(--accent);
    }

    .accent-bar.invalid {
      background: var(--destructive);
      opacity: 0.6;
    }

    /* Search section */
    .search-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .search-section {
        flex-direction: row;
      }
    }

    .search-wrapper {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-foreground);
      width: 1rem;
      height: 1rem;
    }

    /* Input */
    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background-color: rgba(229, 229, 229, 0.3);
      color: var(--foreground);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(82, 82, 82, 0.2);
    }

    .search-wrapper input {
      padding-left: 2.5rem;
      background-color: rgba(229, 229, 229, 0.5);
      border: none;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--primary-foreground);
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--foreground);
    }

    .btn-outline:hover {
      background-color: var(--secondary);
    }

    .btn-ghost {
      background-color: transparent;
      color: var(--muted-foreground);
      padding: 0.5rem;
    }

    .btn-ghost:hover {
      background-color: var(--secondary);
    }

    .btn-ghost.hover-primary:hover {
      color: var(--primary);
    }

    .btn-ghost.hover-destructive:hover {
      color: var(--destructive);
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--primary);
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-flex-1 {
      flex: 1;
    }

    /* Form grid */
    .form-grid {
      display: grid;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 0.5rem;
    }

    .form-label svg {
      color: var(--primary);
    }

    /* Radio buttons */
    .radio-group {
      display: flex;
      gap: 1rem;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
    }

    input[type="radio"] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--primary);
    }

    input[type="radio"].radio-destructive {
      accent-color: var(--destructive);
    }

    /* Button group */
    .btn-group {
      display: flex;
      gap: 0.75rem;
      padding-top: 1rem;
    }

    /* Records header */
    .records-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .records-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 9999px;
      background-color: var(--secondary);
      color: var(--secondary-foreground);
    }

    .badge-valid {
      background-color: rgba(20, 184, 166, 0.15);
      color: var(--accent);
      border: 1px solid rgba(20, 184, 166, 0.3);
    }

    .badge-invalid {
      background-color: rgba(220, 38, 38, 0.15);
      color: var(--destructive);
      border: 1px solid rgba(220, 38, 38, 0.3);
    }

    /* Record card */
    .record-card {
      transition: box-shadow 0.2s;
    }

    .record-card:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    .record-content {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .record-content {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .record-grid {
      flex: 1;
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .record-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .record-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .record-field-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .record-field-value {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .record-field-value svg {
      color: rgba(82, 82, 82, 0.6);
    }

    .record-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .action-buttons {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .record-card:hover .action-buttons {
      opacity: 1;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
    }

    .empty-state svg {
      width: 3rem;
      height: 3rem;
      color: rgba(115, 115, 115, 0.5);
      margin: 0 auto 1rem;
    }

    .empty-state p {
      color: var(--muted-foreground);
    }

    /* Icon */
    .icon {
      width: 1rem;
      height: 1rem;
      display: inline-block;
      vertical-align: middle;
    }

    .icon-sm {
      width: 0.875rem;
      height: 0.875rem;
    }

    .hidden {
      display: none;
    }

    /* Form section spacing */
    .form-section {
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container space-y-8">
    <!-- Header -->
    <div class="header">
      <div class="header-badge">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Sistema de Direcciones
      </div>
      <h1>Registro de Direcciones</h1>
      <p>Gestiona y administra las direcciones registradas en el sistema</p>
    </div>

    <!-- Search and Add -->
    <div class="card">
      <div class="card-content p-4">
        <div class="search-section">
          <div class="search-wrapper">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="searchInput" placeholder="Buscar por calle, colonia o ciudad...">
          </div>
          <button class="btn btn-primary" id="addBtn">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nueva Dirección
          </button>
        </div>
      </div>
    </div>

    <!-- Add/Edit Form -->
    <div class="card hidden" id="formCard">
      <div class="accent-bar"></div>
      <div class="card-header">
        <h3 class="card-title" id="formTitle">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span id="formTitleText">Nueva Dirección</span>
        </h3>
        <p class="card-description" id="formDescription">Completa todos los campos para agregar una nueva dirección</p>
      </div>
      <div class="card-content">
        <form id="addressForm">
          <div class="form-grid">
            <div class="space-y-2">
              <label class="form-label">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Calle
              </label>
              <input type="text" id="calle" placeholder="Ej: Av. Reforma 123" required>
            </div>
            <div class="space-y-2">
              <label class="form-label">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Colonia
              </label>
              <input type="text" id="colonia" placeholder="Ej: Centro Histórico" required>
            </div>
            <div class="space-y-2">
              <label class="form-label">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Ciudad
              </label>
              <input type="text" id="ciudad" placeholder="Ej: Ciudad de México" required>
            </div>
            <div class="space-y-2">
              <label class="form-label">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Fecha de Elaboración
              </label>
              <input type="date" id="fechaElaboracion" required>
            </div>
          </div>
          <div class="form-section space-y-2">
            <label class="form-label">
              <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Estado de Validez
            </label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="valido" value="true" checked>
                <span>Válido</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="valido" value="false" class="radio-destructive">
                <span>No Válido</span>
              </label>
            </div>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn btn-primary btn-flex-1" id="submitBtn">Agregar Dirección</button>
            <button type="button" class="btn btn-outline" id="cancelBtn">Cancelar</button>
          </div>
          <input type="hidden" id="editingId" value="">
        </form>
      </div>
    </div>

    <!-- Records List -->
    <div class="space-y-4">
      <div class="records-header">
        <h2>Direcciones Registradas</h2>
        <span class="badge" id="recordCount">1 registro</span>
      </div>

      <div class="space-y-4" id="recordsList">
        <!-- Records will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    // Mock data simulating SQL database
    let records = [
      {
        id: 1,
        calle: "Av. Reforma 123",
        colonia: "Centro Histórico",
        ciudad: "Ciudad de México",
        fechaElaboracion: "2024-01-15",
        valido: true,
      },
    ];

    // DOM elements
    const searchInput = document.getElementById('searchInput');
    const addBtn = document.getElementById('addBtn');
    const formCard = document.getElementById('formCard');
    const addressForm = document.getElementById('addressForm');
    const cancelBtn = document.getElementById('cancelBtn');
    const recordsList = document.getElementById('recordsList');
    const recordCount = document.getElementById('recordCount');
    const formTitle = document.getElementById('formTitle');
    const formTitleText = document.getElementById('formTitleText');
    const formDescription = document.getElementById('formDescription');
    const submitBtn = document.getElementById('submitBtn');
    const editingIdInput = document.getElementById('editingId');

    // Initialize date to today
    document.getElementById('fechaElaboracion').value = new Date().toISOString().split('T')[0];

    // Format date
    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('es-MX', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      });
    }

    // Render records
    function renderRecords() {
      const searchTerm = searchInput.value.toLowerCase();
      const filtered = records.filter(
        (r) =>
          r.calle.toLowerCase().includes(searchTerm) ||
          r.colonia.toLowerCase().includes(searchTerm) ||
          r.ciudad.toLowerCase().includes(searchTerm)
      );

      recordCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'registro' : 'registros'}`;

      if (filtered.length === 0) {
        recordsList.innerHTML = `
          <div class="card">
            <div class="card-content empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <p>No se encontraron direcciones</p>
              <button class="btn-link" onclick="showAddForm()">Agregar nueva dirección</button>
            </div>
          </div>
        `;
        return;
      }

      recordsList.innerHTML = filtered.map((record) => `
        <div class="card record-card" data-id="${record.id}">
          <div class="accent-bar ${record.valido ? 'valid' : 'invalid'}"></div>
          <div class="card-content" style="padding: 1.25rem;">
            <div class="record-content">
              <div class="record-grid">
                <div>
                  <p class="record-field-label">Calle</p>
                  <p class="record-field-value">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    ${record.calle}
                  </p>
                </div>
                <div>
                  <p class="record-field-label">Colonia</p>
                  <p class="record-field-value">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    ${record.colonia}
                  </p>
                </div>
                <div>
                  <p class="record-field-label">Ciudad</p>
                  <p class="record-field-value">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    ${record.ciudad}
                  </p>
                </div>
                <div>
                  <p class="record-field-label">Fecha de Elaboración</p>
                  <p class="record-field-value">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    ${formatDate(record.fechaElaboracion)}
                  </p>
                </div>
              </div>
              <div class="record-actions">
                <span class="badge ${record.valido ? 'badge-valid' : 'badge-invalid'}">
                  ${record.valido 
                    ? '<svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                    : '<svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                  }
                  ${record.valido ? 'Válido' : 'No Válido'}
                </span>
                <div class="action-buttons">
                  <button class="btn btn-ghost hover-primary" onclick="editRecord(${record.id})" title="Editar">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                  </button>
                  <button class="btn btn-ghost hover-destructive" onclick="deleteRecord(${record.id})" title="Eliminar">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Show add form
    function showAddForm() {
      formCard.classList.remove('hidden');
      formTitleText.textContent = 'Nueva Dirección';
      formDescription.textContent = 'Completa todos los campos para agregar una nueva dirección';
      submitBtn.textContent = 'Agregar Dirección';
      formTitle.innerHTML = `
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span id="formTitleText">Nueva Dirección</span>
      `;
      resetForm();
      searchInput.value = '';
      renderRecords();
    }

    // Edit record
    function editRecord(id) {
      const record = records.find((r) => r.id === id);
      if (!record) return;

      formCard.classList.remove('hidden');
      formTitleText.textContent = 'Editar Dirección';
      formDescription.textContent = 'Modifica los campos necesarios y guarda los cambios';
      submitBtn.textContent = 'Guardar Cambios';
      formTitle.innerHTML = `
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        <span id="formTitleText">Editar Dirección</span>
      `;

      document.getElementById('calle').value = record.calle;
      document.getElementById('colonia').value = record.colonia;
      document.getElementById('ciudad').value = record.ciudad;
      document.getElementById('fechaElaboracion').value = record.fechaElaboracion;
      document.querySelector(`input[name="valido"][value="${record.valido}"]`).checked = true;
      editingIdInput.value = id;
    }

    // Delete record
    function deleteRecord(id) {
      records = records.filter((r) => r.id !== id);
      renderRecords();
    }

    // Reset form
    function resetForm() {
      addressForm.reset();
      document.getElementById('fechaElaboracion').value = new Date().toISOString().split('T')[0];
      document.querySelector('input[name="valido"][value="true"]').checked = true;
      editingIdInput.value = '';
    }

    // Hide form
    function hideForm() {
      formCard.classList.add('hidden');
      resetForm();
    }

    // Event listeners
    addBtn.addEventListener('click', showAddForm);
    cancelBtn.addEventListener('click', hideForm);
    searchInput.addEventListener('input', renderRecords);

    addressForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = {
        calle: document.getElementById('calle').value,
        colonia: document.getElementById('colonia').value,
        ciudad: document.getElementById('ciudad').value,
        fechaElaboracion: document.getElementById('fechaElaboracion').value,
        valido: document.querySelector('input[name="valido"]:checked').value === 'true',
      };

      const editingId = editingIdInput.value;

      if (editingId) {
        records = records.map((r) =>
          r.id === parseInt(editingId) ? { ...formData, id: parseInt(editingId) } : r
        );
      } else {
        const newId = records.length > 0 ? Math.max(...records.map((r) => r.id)) + 1 : 1;
        records.push({ ...formData, id: newId });
      }

      hideForm();
      renderRecords();
    });

    // Initial render
    renderRecords();
  </script>
</body>
</html>
