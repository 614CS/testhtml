<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>
<body>


    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/dist/umd/supabase.min.js"></script>
    
    <script>
  // Initialize the Supabase client
  const supabaseUrl = "https://tszvowudspzdoqbemruw.supabase.co"
  const supabaseKey = "sb_publishable_GOdQfgho54lZ1geMka4mpQ_K681CusQ"
  const supabase = supabase.createClient(supabaseUrl, supabaseKey)

async function printData() {
    const { data, error } = await supabase.from('test').select('*');
    
    if (error) {
        console.error(error);
        return;
    }

    const container = document.getElementById('data-container');
    container.innerHTML = data.map(item => `
        <div class="print-item">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        </div>
    `).join('');
}

printData();
       
    </script>

   
    <h1>Welcome to My Website</h1>
    <p>This is a simple paragraph of text on my new HTML page.</p>

</body>
</html>
