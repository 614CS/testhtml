  async function loginAndGetToken(email, password) {
  // 1. Iniciar sesión con credenciales
  const { data, error } = await authClient.signIn.email({
    email: "123@gmail.com",
    password: "dfasdfsf",
  });

  if (error) {
    console.error("Error al iniciar sesión:", error.message);
    return null;
  }

  // 2. Obtener la sesión actual para extraer el JWT
  const sessionResult = await authClient.getSession();
  
  if (sessionResult.data?.session) {
    // El token JWT se encuentra en la propiedad 'token' de la sesión
    const jwtToken = sessionResult.data.session.token;
    console.log("Tu token JWT:", jwtToken);
    return jwtToken;
  }
  
  return null;
  }
